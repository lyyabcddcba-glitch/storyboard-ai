version: '3.8'

services:
  # ---- Nginx 反向代理 ----
  nginx:
    image: nginx:alpine
    container_name: storyboard-nginx
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - storyboard-net

  # ---- Next.js 应用 ----
  app:
    build: .
    container_name: storyboard-app
    env_file:
      - .env.production
    restart: unless-stopped
    networks:
      - storyboard-net

networks:
  storyboard-net:
    driver: bridge
